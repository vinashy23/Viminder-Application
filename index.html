<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reminder App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      color: white;
      z-index: 10;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.3s;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('background.jpeg') no-repeat center center/cover;
      filter: blur(6px) brightness(50%);
      z-index: -1;
    }

    .container {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .content {
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }
    /* Popup background */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 100;
}

/* Popup box */
.popup-content {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  width: 300px;
  position: relative;
}

/* Close button */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 20px;
  cursor: pointer;
}

/* Links */
.popup-content a {
  text-decoration: none;
  color: #333;
}

.popup-content a:hover {
  text-decoration: underline;
}

.social-icons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 15px;
}

.social-icons a {
  font-size: 28px;
  color: #333;
  transition: 0.3s;
}

.social-icons a:hover {
  transform: scale(1.2);
  opacity: 0.7;
}
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="navbar">
    <div class="logo">Viminder</div>
    <div class="nav-links">
      <a href="#" onclick="openContact()">Contact</a>
    </div>
  </div>

  <div class="container">
    <div class="content">
      <h1>Welcome to Reminder App</h1>
      <p>
        Stay organized and never miss an important moment again. 
        Our reminder app helps you manage tasks, set alerts, and keep track of your daily schedule with ease.
      </p>
      <button class="btn" onclick="goNext()">Get Started</button>
    </div>
  </div>

  <script>
    function goNext() {
      window.location.href = "main.html"; // change this to your next page
    }
    function openContact(){
  document.getElementById("contactPopup").style.display = "flex";
}

function closeContact(){
  document.getElementById("contactPopup").style.display = "none";
}
  </script>
<div id="contactPopup" class="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closeContact()">×</span>
    <h2>Contact Me</h2>
    
<div class="social-icons">

  </a>

  </a>

  </a>

  <a href="mailto:vinashy00@gmail.com">

  </a>
</div>
  </div>
</div>
</body>
</html>
